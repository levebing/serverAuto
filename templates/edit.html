<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器巡检系统 - 编辑服务器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 220px;
            background: rgba(26, 26, 46, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
        }
        .logo {
            padding: 0 20px;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 18px;
            color: #fff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo h1 svg {
            width: 24px;
            height: 24px;
        }
        .menu {
            list-style: none;
        }
        .menu li {
            margin-bottom: 4px;
        }
        .menu li a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            color: #a0aec0;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        .menu li a:hover {
            background: rgba(102, 126, 234, 0.2);
            color: #fff;
            border-left-color: #667eea;
        }
        .menu li a.active {
            background: rgba(102, 126, 234, 0.3);
            color: #fff;
            border-left-color: #667eea;
        }
        .menu li a svg {
            width: 18px;
            height: 18px;
        }
        .main-content {
            flex: 1;
            margin-left: 220px;
            padding: 24px;
        }
        .header {
            margin-bottom: 24px;
        }
        .header h2 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
        }
        .form-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #fff;
            font-size: 14px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #a0aec0;
        }
        .form-group .hint {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 5px;
        }
        .form-group input[type="file"] {
            padding: 8px;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #a0aec0;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .toggle-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #fff;
            font-size: 14px;
        }
        .toggle-label input {
            width: auto;
        }
        .has-key {
            background: #10b981;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #fff;
            margin-top: 5px;
            display: inline-block;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .group-section {
            padding: 0 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .group-section h4 {
            color: #a0aec0;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .group-list {
            list-style: none;
        }
        .group-list li {
            margin-bottom: 4px;
        }
        .group-list li a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            color: #a0aec0;
            text-decoration: none;
            font-size: 13px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .group-list li a:hover {
            background: rgba(102, 126, 234, 0.2);
            color: #fff;
        }
        .add-group-btn {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 4px;
            color: #a0aec0;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
            width: 100%;
        }
        .add-group-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            color: #fff;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 24px;
            width: 400px;
            max-width: 90%;
        }
        .modal-content h3 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-content input:focus {
            outline: none;
            border-color: #667eea;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #a0aec0;
        }
        .modal-actions .btn-confirm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
    </style>
</head>
<body>
    {% include 'sidebar.html' %}
    
    <div class="main-content">
        <div class="header">
            <h2>✏️ 编辑服务器</h2>
        </div>
        
        <div class="form-card">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>分组</label>
                    <select name="group_id">
                        {% for group in groups %}
                        <option value="{{ group[0] }}" {{ 'selected' if server[7] == group[0] else '' }}>{{ group[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label>服务名称 *</label>
                    <input type="text" name="name" required value="{{ server[1] }}">
                </div>
                
                <div class="form-group">
                    <label>IP地址 *</label>
                    <input type="text" name="ip" required value="{{ server[2] }}">
                </div>
                
                <div class="form-group">
                    <label>端口</label>
                    <input type="number" name="port" value="{{ server[3] }}">
                </div>
                
                <div class="form-group">
                    <label>登录用户名</label>
                    <input type="text" name="username" value="{{ server[4] }}">
                </div>
                
                <div class="form-group">
                    <label>登录密码</label>
                    <input type="password" name="password" placeholder="留空则保持原密码">
                </div>
                
                <div class="form-group">
                    <label>备注</label>
                    <textarea name="remark">{{ server[8] or '' }}</textarea>
                </div>
                
                <div class="toggle-section">
                    <label class="toggle-label">
                        <input type="checkbox" id="use_key" {{ 'checked' if server[5] else '' }} onchange="toggleAuthMethod()"> 使用秘钥登录
                    </label>
                </div>
                
                <div class="form-group" id="key_upload_group" style="{{ 'display: block' if server[5] else 'display: none' }}">
                    <label>上传秘钥文件</label>
                    <input type="file" name="private_key" accept=".pem,.key">
                    <div class="hint">支持 .pem 和 .key 格式的SSH秘钥文件</div>
                    {% if server[5] %}
                    <div class="has-key">✓ 已配置秘钥文件</div>
                    {% endif %}
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="modal" id="addGroupModal">
        <div class="modal-content">
            <h3>添加分组</h3>
            <input type="text" id="group_name" placeholder="请输入分组名称">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="hideAddGroupModal()">取消</button>
                <button class="btn-confirm" onclick="addNewGroup()">确认提交</button>
            </div>
        </div>
    </div>
    
    <script>
        function toggleAuthMethod() {
            const useKey = document.getElementById('use_key').checked;
            document.getElementById('key_upload_group').style.display = useKey ? 'block' : 'none';
        }
        
        function showAddGroupModal() {
            document.getElementById('addGroupModal').classList.add('show');
        }
        
        function hideAddGroupModal() {
            document.getElementById('addGroupModal').classList.remove('show');
            document.getElementById('group_name').value = '';
        }
        
        function addNewGroup() {
            const name = document.getElementById('group_name').value.trim();
            if (!name) {
                alert('请输入分组名称');
                return;
            }
            
            fetch('/api/add_group', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name: name })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                } else {
                    alert(data.message);
                }
            });
        }
    </script>
</body>
</html>
