<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器巡检系统 - 新增服务器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 220px;
            background: rgba(26, 26, 46, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
        }
        .logo {
            padding: 0 20px;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 18px;
            color: #fff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo h1 svg {
            width: 24px;
            height: 24px;
        }
        .menu {
            list-style: none;
        }
        .menu li {
            margin-bottom: 4px;
        }
        .menu li a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            color: #a0aec0;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        .menu li a:hover {
            background: rgba(102, 126, 234, 0.2);
            color: #fff;
            border-left-color: #667eea;
        }
        .menu li a.active {
            background: rgba(102, 126, 234, 0.3);
            color: #fff;
            border-left-color: #667eea;
        }
        .menu li a svg {
            width: 18px;
            height: 18px;
        }
        .main-content {
            flex: 1;
            margin-left: 220px;
            padding: 24px;
        }
        .header {
            margin-bottom: 24px;
        }
        .header h2 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
        }
        .form-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #fff;
            font-size: 14px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #a0aec0;
        }
        .form-group .hint {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 5px;
        }
        .form-group input[type="file"] {
            padding: 8px;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #a0aec0;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .toggle-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #fff;
            font-size: 14px;
        }
        .toggle-label input {
            width: auto;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <h1>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                    <line x1="7" y1="2" x2="7" y2="22"></line>
                    <line x1="17" y1="2" x2="17" y2="22"></line>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                </svg>
                服务器巡检系统
            </h1>
        </div>
        
        <ul class="menu">
            <li>
                <a href="/">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 21V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"></path>
                        <path d="M14 2v4"></path>
                        <path d="M10 2v4"></path>
                        <path d="M6 2v4"></path>
                    </svg>
                    服务器列表
                </a>
            </li>
            <li>
                <a href="/records">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    巡检记录
                </a>
            </li>
            <li>
                <a href="#">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    系统设置
                </a>
            </li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h2>📝 新增服务器</h2>
        </div>
        
        <div class="form-card">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>服务名称 *</label>
                    <input type="text" name="name" required placeholder="请输入服务名称">
                </div>
                
                <div class="form-group">
                    <label>IP地址 *</label>
                    <input type="text" name="ip" required placeholder="请输入IP地址">
                </div>
                
                <div class="form-group">
                    <label>端口</label>
                    <input type="number" name="port" value="22">
                </div>
                
                <div class="form-group">
                    <label>登录用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label>登录密码</label>
                    <input type="password" name="password" placeholder="请输入密码">
                </div>
                
                <div class="form-group">
                    <label>备注</label>
                    <textarea name="remark" placeholder="请输入备注信息"></textarea>
                </div>
                
                <div class="toggle-section">
                    <label class="toggle-label">
                        <input type="checkbox" id="use_key" onchange="toggleAuthMethod()"> 使用秘钥登录
                    </label>
                </div>
                
                <div class="form-group" id="key_upload_group" style="display: none;">
                    <label>上传秘钥文件</label>
                    <input type="file" name="private_key" accept=".pem,.key">
                    <div class="hint">支持 .pem 和 .key 格式的SSH秘钥文件</div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">取消</button>
                    <button type="submit" class="btn btn-primary">确认提交</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        function toggleAuthMethod() {
            const useKey = document.getElementById('use_key').checked;
            document.getElementById('key_upload_group').style.display = useKey ? 'block' : 'none';
        }
    </script>
</body>
</html>
