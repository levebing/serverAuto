<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技风特效示例</title>
    
    <!-- 引用科技风特效CSS -->
    <link rel="stylesheet" href="/static/css/tech-effects.css">
    
    <style>
        /* 自定义页面样式 */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #050d29 0%, #0a1742 50%, #0f1e4d 100%);
            color: #e0f7ff;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
            position: relative;
            z-index: 5;
        }

        .page-header {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(73, 160, 255, 0.4);
        }

        .demo-section {
            margin-bottom: 30px;
        }

        .demo-section h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #a0d8ff;
        }

        .status-demo {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn-demo {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(60, 140, 255, 0.2);
        }

        th {
            background: rgba(20, 38, 79, 0.8);
            color: #a0d8ff;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 粒子容器（必须） -->
    <div id="particles-js"></div>

    <!-- 侧边栏 -->
    <div class="sidebar">
        <div style="padding: 20px;">
            <div style="text-align: center; font-size: 18px; font-weight: bold; color: #49a0ff; margin-bottom: 30px; text-shadow: 0 0 10px rgba(73, 160, 255, 0.5);">
                科技风特效演示
            </div>
            <ul class="menu-list" style="list-style: none; padding: 0;">
                <li style="margin-bottom: 4px;"><a href="#" style="display: block; padding: 12px 15px; color: #c0e0ff; text-decoration: none; border-left: 3px solid transparent; transition: all 0.3s;">首页</a></li>
                <li style="margin-bottom: 4px;"><a href="#" style="display: block; padding: 12px 15px; color: #c0e0ff; text-decoration: none; border-left: 3px solid #49a0ff; background: rgba(60, 140, 255, 0.15);">特效演示</a></li>
                <li style="margin-bottom: 4px;"><a href="#" style="display: block; padding: 12px 15px; color: #c0e0ff; text-decoration: none; border-left: 3px solid transparent; transition: all 0.3s;">设置</a></li>
            </ul>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="page-header">✨ 科技风特效演示</div>

        <!-- 搜索栏演示 -->
        <div class="demo-section">
            <h3>🔍 搜索栏（边框流光）</h3>
            <div class="search-bar">
                <input type="text" placeholder="请输入搜索内容" style="flex: 1; padding: 8px 12px; background: rgba(7, 16, 40, 0.7); border: 1px solid rgba(60, 140, 255, 0.25); border-radius: 4px; color: #e0f7ff;">
                <button class="btn-blue">搜索</button>
                <button class="btn-add">+ 添加</button>
            </div>
        </div>

        <!-- 状态文字发光演示 -->
        <div class="demo-section">
            <h3>📊 状态文字发光效果</h3>
            <div class="status-demo">
                <div><span class="status-normal">✅ 正常状态</span></div>
                <div><span class="status-error">⚠️ 告警状态</span></div>
            </div>
        </div>

        <!-- 按钮悬浮发光演示 -->
        <div class="demo-section">
            <h3>🎯 按钮悬浮发光效果</h3>
            <div class="btn-demo">
                <button class="btn-blue">主要按钮</button>
                <button class="btn-edit">编辑按钮</button>
                <button class="btn-delete">删除按钮</button>
            </div>
        </div>

        <!-- 卡片边框流光演示 -->
        <div class="demo-section">
            <h3>🃏 卡片边框流光效果</h3>
            <div class="card" style="padding: 20px;">
                <table>
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>状态</th>
                            <th>时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>服务器A</td>
                            <td><span class="status-normal">正常</span></td>
                            <td>2026-05-14 10:00</td>
                        </tr>
                        <tr>
                            <td>服务器B</td>
                            <td><span class="status-error">告警</span></td>
                            <td>2026-05-14 09:30</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 引用科技风特效JS -->
    <script src="/static/js/tech-effects.js"></script>
</body>
</html>
