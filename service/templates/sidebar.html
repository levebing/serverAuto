<script>
// 全局函数，供 base.html 调用
function toggleMobileSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobileOverlay');
    const menuBtn = document.querySelector('.mobile-menu-btn');
    
    if (sidebar.classList.contains('open')) {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
        menuBtn.classList.remove('open');
    } else {
        sidebar.classList.add('open');
        overlay.classList.add('show');
        menuBtn.classList.add('open');
    }
}

function toggleUserMenu() {
    const dropdown = document.getElementById('userMenuDropdown');
    const btn = document.querySelector('.user-menu-btn');
    
    if (dropdown.classList.contains('show')) {
        dropdown.classList.remove('show');
        btn.classList.remove('open');
    } else {
        dropdown.classList.add('show');
        btn.classList.add('open');
    }
}

function toggleSubmenu(event, element) {
    event.preventDefault();
    event.stopPropagation();
    const parentLi = element.closest('.has-submenu');
    const submenu = parentLi.querySelector('.submenu');
    const icon = parentLi.querySelector('.submenu-icon');
    
    if (submenu) {
        const isShowing = submenu.style.display === 'block';
        submenu.style.display = isShowing ? 'none' : 'block';
        if (icon) {
            icon.style.transform = isShowing ? 'rotate(0deg)' : 'rotate(180deg)';
        }
    }
}

function confirmLogout() {
    if (confirm('确定要退出登录吗？')) {
        window.location.href = '/logout';
    }
}

// 更新时间
function updateTime() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('currentTime').textContent = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
}

// 初始化
updateTime();
setInterval(updateTime, 1000);

// 点击其他地方关闭用户菜单
document.addEventListener('click', function(e) {
    const userMenu = document.querySelector('.user-menu');
    if (userMenu && !userMenu.contains(e.target)) {
        const dropdown = document.getElementById('userMenuDropdown');
        const btn = document.querySelector('.user-menu-btn');
        dropdown.classList.remove('show');
        btn.classList.remove('open');
    }
});

// 移动端点击菜单链接后关闭侧边栏
document.querySelectorAll('.sidebar .menu a').forEach(link => {
    link.addEventListener('click', function() {
        if (window.innerWidth <= 768) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            const menuBtn = document.querySelector('.mobile-menu-btn');
            
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
            menuBtn.classList.remove('open');
        }
    });
});

// 窗口大小变化时更新侧边栏状态
window.addEventListener('resize', function() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobileOverlay');
    const menuBtn = document.querySelector('.mobile-menu-btn');
    
    if (window.innerWidth <= 768) {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
        if (menuBtn) {
            menuBtn.classList.remove('open');
        }
    } else {
        sidebar.classList.add('open');
        overlay.classList.remove('show');
        if (menuBtn) {
            menuBtn.classList.remove('open');
        }
    }
});

// 页面加载时初始化移动端侧边栏状态
document.addEventListener('DOMContentLoaded', function() {
    if (window.innerWidth <= 768) {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');
        const menuBtn = document.querySelector('.mobile-menu-btn');
        
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
        if (menuBtn) {
            menuBtn.classList.remove('open');
        }
    }
});
</script>
