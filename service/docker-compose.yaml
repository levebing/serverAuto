version: '3.8'

services:
  server-auto:
    build: .
    container_name: server-auto
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - PORT=5000
      - TZ=Asia/Shanghai
    volumes:
      - ./servers.db:/app/servers.db
      - ./.env:/app/.env
      - ./upload:/app/upload
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped